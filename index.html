<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoolRetroHub - 游戏库</title>
    <link rel="icon" href="favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d14;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 32px 20px 28px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(233,69,96,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .header h1 {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #7e61cd, #533483);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.5px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header h1 img {
            height: 40px;
            width: auto;
            display: block;
        }
        .header p {
            color: #666;
            margin-top: 6px;
            font-size: 0.95em;
            position: relative;
        }
        .header .stats {
            color: #555;
            font-size: 0.8em;
            margin-top: 4px;
            position: relative;
        }

        .search-section {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 20px 0;
        }
        .search-wrapper {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }
        .search-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #555;
            pointer-events: none;
        }
        .search-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #e0e0e0;
            font-size: 0.95em;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
        }
        .search-wrapper input:focus {
            border-color: rgba(233,69,96,0.4);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(233,69,96,0.08);
        }
        .search-wrapper input::placeholder { color: #555; }
        .search-clear {
            display: none;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px;
            font-size: 1.1em;
            line-height: 1;
        }
        .search-clear.visible { display: block; }
        .search-clear:hover { color: #aaa; }
        .search-filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .filter-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            color: #666;
            font-size: 0.8em;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: rgba(233,69,96,0.3);
            color: #aaa;
        }
        .filter-btn.active {
            background: rgba(233,69,96,0.12);
            border-color: rgba(233,69,96,0.3);
            color: #e94560;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .game-count {
            color: #555;
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }
        .game-card {
            background: #14141f;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(233,69,96,0.25);
            box-shadow: 0 10px 30px rgba(233,69,96,0.1);
        }
        .game-card .cover-area {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #1a1a2e, #1f1f35);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .game-card .cover-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .game-card .cover-area .no-cover {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #333;
        }
        .game-card .cover-area .no-cover svg {
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }
        .game-card .cover-area .no-cover span {
            font-size: 0.7em;
            color: #444;
        }
        .game-card .info {
            padding: 12px 14px 14px;
        }
        .game-card .info .title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .game-card .info .title-row h3 {
            font-size: 0.95em;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .game-card .info .core-badge {
            flex-shrink: 0;
            background: rgba(233,69,96,0.1);
            color: #e94560;
            font-size: 0.65em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .game-card .info p {
            color: #666;
            font-size: 0.78em;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }
        .empty-state svg {
            width: 56px;
            height: 56px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .empty-state h2 {
            font-size: 1.2em;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .empty-state p {
            font-size: 0.85em;
            line-height: 1.6;
            color: #555;
        }
        .empty-state code {
            background: #1a1a2e;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .footer {
            text-align: center;
            padding: 24px 20px 32px;
            color: #777;
            font-size: 0.75em;
            line-height: 1.8;
        }
        .footer a {
            color: #888;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .footer a:hover {
            color: #aaa;
        }
        .footer .gh-link svg {
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 4px;
            fill: currentColor;
        }

        #no-results { display: none; }
        .game-card.hidden { display: none; }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.6em; gap: 8px; }
            .header h1 img { height: 30px; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .game-card .info { padding: 10px 12px 12px; }
            .game-card .info .title-row h3 { font-size: 0.85em; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><img src="logo.png" alt="KoolRetroHub">KoolRetroHub</h1>
    <p>经典游戏在线模拟器</p>
    <div class="stats" id="stats">加载中...</div>
</div>

<div class="search-section">
    <div class="search-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="搜索游戏名称..." autocomplete="off">
        <button class="search-clear" id="search-clear">✕</button>
    </div>
    <div class="search-filters" id="filter-bar"></div>
</div>

<div class="container">
    <div class="game-count" id="game-count"></div>
    <div class="game-grid" id="game-grid"></div>
    <div class="empty-state" id="no-results">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/></svg>
        <h2>未找到匹配的游戏</h2>
        <p>尝试其他关键词搜索</p>
    </div>
    <div class="empty-state" id="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <h2>还没有添加游戏</h2>
        <p>请将游戏 ROM 放入 <code>data/roms/</code> 目录，并编辑 <code>config/games.json</code> 添加游戏信息。</p>
    </div>
</div>

<script>
(async function() {
    let games = [];
    try {
        const resp = await fetch('config/games.json');
        games = await resp.json();
    } catch(e) {
        document.getElementById('stats').textContent = '加载失败';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }

    if (!Array.isArray(games) || games.length === 0) {
        document.getElementById('stats').textContent = '共 0 个游戏';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }

    const stats = document.getElementById('stats');
    const grid = document.getElementById('game-grid');
    const gameCount = document.getElementById('game-count');
    const noResults = document.getElementById('no-results');
    const filterBar = document.getElementById('filter-bar');
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    // Unique cores for filter buttons
    const cores = [...new Set(games.map(g => g.core))];
    if (cores.length > 1) {
        let html = '<button class="filter-btn active" data-core="all">全部</button>';
        cores.forEach(c => {
            html += '<button class="filter-btn" data-core="' + c.replace(/"/g, '&quot;') + '">' + c.replace(/</g, '&lt;') + '</button>';
        });
        filterBar.innerHTML = html;
    }

    // Render cards
    function renderCards(gameList) {
        grid.innerHTML = '';
        gameList.forEach(g => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.setAttribute('data-title', g.title);
            card.setAttribute('data-core', g.core);
            card.onclick = () => location.href = 'play.html?game=' + encodeURIComponent(g.id);

            let coverHtml;
            if (g.cover) {
                coverHtml = '<img src="' + g.cover.replace(/"/g, '&quot;') + '" alt="' + g.title.replace(/"/g, '&quot;') + '" loading="lazy">';
            } else {
                coverHtml = '<div class="no-cover">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' +
                    '<span>暂无封面</span></div>';
            }

            card.innerHTML =
                '<div class="cover-area">' + coverHtml + '</div>' +
                '<div class="info">' +
                    '<div class="title-row">' +
                        '<h3>' + g.title.replace(/</g, '&lt;') + '</h3>' +
                        '<span class="core-badge">' + g.core.replace(/</g, '&lt;') + '</span>' +
                    '</div>' +
                    (g.description ? '<p>' + g.description.replace(/</g, '&lt;') + '</p>' : '') +
                '</div>';
            grid.appendChild(card);

            // Cover image error → fallback to placeholder
            const img = card.querySelector('.cover-area img');
            if (img) {
                img.addEventListener('error', function() {
                    this.outerHTML = '<div class="no-cover">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' +
                        '<span>暂无封面</span></div>';
                });
            }
        });
    }

    renderCards(games);
    stats.textContent = '共 ' + games.length + ' 个游戏';
    gameCount.textContent = '显示 ' + games.length + ' 个游戏';

    // Search & filter
    let activeFilter = 'all';

    function doFilter() {
        const query = searchInput.value.toLowerCase().trim();
        let visibleCount = 0;
        const cards = grid.querySelectorAll('.game-card');
        cards.forEach(card => {
            const title = card.getAttribute('data-title').toLowerCase();
            const core = card.getAttribute('data-core');
            const matchesSearch = !query || title.includes(query);
            const matchesCore = activeFilter === 'all' || core === activeFilter;
            card.classList.toggle('hidden', !(matchesSearch && matchesCore));
            if (matchesSearch && matchesCore) visibleCount++;
        });
        gameCount.textContent = '显示 ' + visibleCount + ' 个游戏';
        noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        searchClear.classList.toggle('visible', query.length > 0);
    }

    window.clearSearch = function() {
        searchInput.value = '';
        searchInput.focus();
        doFilter();
    };

    window.filterByCore = function(core) {
        activeFilter = core;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-core') === core);
        });
        doFilter();
    };

    searchInput.addEventListener('input', doFilter);
    searchClear.addEventListener('click', clearSearch);

    // Re-bind filter button clicks (since they're created dynamically)
    filterBar.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (btn) {
            window.filterByCore(btn.getAttribute('data-core'));
        }
    });
})();
</script>

</div>
</body>
</html>
